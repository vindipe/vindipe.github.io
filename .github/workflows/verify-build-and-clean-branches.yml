name: Remove temporary verification files

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Remove temporary verification files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch BUILD_DIAGNOSTIC.md
          git rm --ignore-unmatch .github/workflows/verify-build-and-clean-branches.yml
          git commit -m "chore: remove temporary verification files [skip ci]"
          git push origin HEAD:main
