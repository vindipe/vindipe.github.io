<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">PhD thesis preview - Comparing Blockchains</title>
  <desc id="desc">Editorial thumbnail for Vincenzo P. Di Perna's doctoral dissertation on blockchain performance, energy, repeatability, and economic efficiency.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#15294b"/>
      <stop offset="1" stop-color="#26466c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6d98b"/>
      <stop offset="1" stop-color="#d9a84e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eef7"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#ffffff" opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="36" fill="url(#dots)"/>
  <circle cx="1125" cy="-15" r="260" fill="#6fa8dc" opacity="0.09"/>
  <circle cx="1025" cy="650" r="300" fill="#d9a84e" opacity="0.08"/>

  <g transform="translate(70 70)">
    <rect x="0" y="0" width="210" height="44" rx="22" fill="#ffffff" opacity="0.12"/>
    <text x="105" y="29" text-anchor="middle" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="700" letter-spacing="2">PHD THESIS · 2026</text>

    <rect x="0" y="76" width="90" height="6" rx="3" fill="url(#gold)"/>

    <text x="0" y="142" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="66" font-weight="800" letter-spacing="-1.5">Comparing</text>
    <text x="0" y="212" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="66" font-weight="800" letter-spacing="-1.5">Blockchains</text>

    <text x="0" y="267" fill="#dce8f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="500">Performance, Energy, and</text>
    <text x="0" y="305" fill="#dce8f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="500">Economic Efficiencies</text>

    <g transform="translate(0 360)">
      <g>
        <circle cx="10" cy="10" r="10" fill="#6fa8dc"/>
        <text x="32" y="17" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Performance</text>
      </g>
      <g transform="translate(205 0)">
        <circle cx="10" cy="10" r="10" fill="#77c4a3"/>
        <text x="32" y="17" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Energy</text>
      </g>
      <g transform="translate(0 48)">
        <circle cx="10" cy="10" r="10" fill="#c59be8"/>
        <text x="32" y="17" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Repeatability</text>
      </g>
      <g transform="translate(205 48)">
        <circle cx="10" cy="10" r="10" fill="#f0ba68"/>
        <text x="32" y="17" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Economic efficiency</text>
      </g>
    </g>

    <text x="0" y="515" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Vincenzo P. Di Perna</text>
    <text x="0" y="551" fill="#bfcde0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Università degli Studi di Camerino</text>
  </g>

  <g transform="translate(820 112)">
    <rect x="38" y="16" width="260" height="380" rx="20" fill="#081225" opacity="0.55" transform="rotate(5 168 206)"/>
    <rect x="0" y="0" width="270" height="390" rx="20" fill="url(#paper)" transform="rotate(-4 135 195)"/>
    <g transform="rotate(-4 135 195)">
      <rect x="28" y="28" width="214" height="9" rx="4.5" fill="#1a3557"/>
      <rect x="28" y="55" width="96" height="5" rx="2.5" fill="#d9a84e"/>
      <text x="28" y="112" fill="#10223c" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800">COMPARING</text>
      <text x="28" y="148" fill="#10223c" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800">BLOCKCHAINS</text>
      <text x="28" y="184" fill="#5a6d84" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">DOCTORAL DISSERTATION</text>

      <g transform="translate(44 238)">
        <line x1="15" y1="0" x2="75" y2="30" stroke="#6fa8dc" stroke-width="4" opacity="0.85"/>
        <line x1="75" y1="30" x2="132" y2="2" stroke="#77c4a3" stroke-width="4" opacity="0.85"/>
        <line x1="75" y1="30" x2="40" y2="88" stroke="#c59be8" stroke-width="4" opacity="0.85"/>
        <line x1="75" y1="30" x2="150" y2="86" stroke="#f0ba68" stroke-width="4" opacity="0.85"/>
        <circle cx="15" cy="0" r="12" fill="#6fa8dc"/>
        <circle cx="75" cy="30" r="16" fill="#1a3557"/>
        <circle cx="132" cy="2" r="12" fill="#77c4a3"/>
        <circle cx="40" cy="88" r="12" fill="#c59be8"/>
        <circle cx="150" cy="86" r="12" fill="#f0ba68"/>
      </g>

      <rect x="28" y="352" width="132" height="5" rx="2.5" fill="#a9b6c7"/>
      <rect x="28" y="367" width="92" height="5" rx="2.5" fill="#c6cfda"/>
    </g>
  </g>

  <g transform="translate(1000 500)">
    <circle cx="0" cy="0" r="42" fill="#ffffff" opacity="0.10"/>
    <circle cx="0" cy="0" r="27" fill="none" stroke="#f6d98b" stroke-width="3" opacity="0.9"/>
    <path d="M-10 0h20M0-10v20" stroke="#f6d98b" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
